<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestor de Pré-Inscritos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:#e5e7eb;
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h2{
margin-bottom:20px;
}

input,select,button{
padding:10px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
background:#2563eb;
cursor:pointer;
}

.filtros{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #1e293b;
}

.btn-editar{
background:#eab308;
color:black;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#020617;
padding:20px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.actions{
display:flex;
gap:10px;
}

.hidden{
display:none;
}

.login{
max-width:400px;
margin:auto;
margin-top:100px;
display:flex;
flex-direction:column;
gap:10px;
}

</style>

</head>
<body>

<script src="/js/igc-config.js"></script>

<!-- LOGIN -->

<div id="loginBox" class="login">

<h2>Acesso Restrito</h2>

<input type="password" id="senhaLogin" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="loginErro"></p>

</div>

<!-- APP -->

<div id="appBox" class="container" style="display:none">

<h2>Gestor de Pré-Inscritos</h2>

<div class="filtros">

<input id="fCpf" placeholder="CPF" oninput="buscarAuto()">
<input id="fNome" placeholder="Nome" oninput="buscarAuto()">
<input id="fEmail" placeholder="Email" oninput="buscarAuto()">
<input id="fTurma" placeholder="Turma" oninput="buscarAuto()">

</div>

<button onclick="carregar()">Limpar</button>

<br><br>

<table>

<thead>
<tr>
<th>CPF</th>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Curso</th>
<th>Turma</th>
<th>Pagamento</th>
<th></th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Editar inscrição</h3>

<input id="eCpf">
<input id="eNome">
<input id="eEmail">
<input id="eTelefone">

<select id="ePagamento">
<option value="">---</option>
<option>SIM</option>
<option>NÃO</option>
<option>PROCESSADO</option>
</select>

<div class="actions">

<button onclick="salvar()">Salvar</button>
<button onclick="fechar()">Cancelar</button>

</div>

</div>

</div>

<script>

const API = window.IGC_CONFIG.APPS_SCRIPT_BASE;

let dados=[];
let linhaAtual=null;
let senha="";

/* LOGIN */

async function login(){

const senhaDigitada = document.getElementById("senhaLogin").value;

const res = await fetch(API,{
method:"POST",
body:JSON.stringify({
acao:"loginCursos",
senha:senhaDigitada
})
});

const r = await res.json();

if(!r.ok){
document.getElementById("loginErro").innerText="Senha inválida";
return;
}

senha = senhaDigitada;

/* ESCONDE LOGIN */
document.getElementById("loginBox").style.display="none";

/* MOSTRA APP */
document.getElementById("appBox").style.display="block";

carregar();

}



  
/* LISTAR */

async function carregar(){

/* LIMPA FILTROS */
document.getElementById("fCpf").value="";
document.getElementById("fNome").value="";
document.getElementById("fEmail").value="";
document.getElementById("fTurma").value="";

const res = await fetch(API+"?acao=listarPreInscritos");

dados = await res.json();

render(dados);

}








  
/* RENDER */

function render(lista){

const tbody=document.getElementById("lista");

tbody.innerHTML="";

lista.forEach(i=>{

tbody.innerHTML+=`
<tr>

<td>${i.cpf}</td>
<td>${i.nome}</td>
<td>${i.email}</td>
<td>${i.telefone}</td>
<td>${i.curso}</td>
<td>${i.turma}</td>
<td>${i.pagamento||""}</td>

<td>
<button class="btn-editar"
onclick="editar(${i.linha})">
Editar
</button>
</td>

</tr>
`;

});

}

/* BUSCAR */

async function buscar(){

const cpf=fCpf.value;
const nome=fNome.value;
const email=fEmail.value;
const turma=fTurma.value;

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"buscarPreInscritos",

filtro:{
cpf,
nome,
email,
turma
}

})
});

const r=await res.json();

dados=r;

render(dados);

}

/* EDITAR */

function editar(linha){

linhaAtual=linha;

const r=dados.find(x=>x.linha===linha);

eCpf.value=r.cpf;
eNome.value=r.nome;
eEmail.value=r.email;
eTelefone.value=r.telefone;
ePagamento.value=r.pagamento;

modal.style.display="flex";

}

/* FECHAR MODAL */

function fechar(){

modal.style.display="none";

}





async function buscarAuto(){

const cpf=fCpf.value;
const nome=fNome.value;
const email=fEmail.value;
const turma=fTurma.value;

if(!cpf && !nome && !email && !turma){
carregar();
return;
}

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"buscarPreInscritos",

filtro:{
cpf,
nome,
email,
turma
}

})
});

const r=await res.json();

dados=r;

render(dados);

}
  








  
/* SALVAR */

async function salvar(){

await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"editarPreInscrito",

senha:senha,

linha:linhaAtual,

cpf:eCpf.value,
nome:eNome.value,
email:eEmail.value,
telefone:eTelefone.value,
pagamento:ePagamento.value

})
});

fechar();

carregar();

}

</script>

</body>
</html>
