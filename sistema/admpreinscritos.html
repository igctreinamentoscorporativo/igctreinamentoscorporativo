<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestor de Pré-Inscritos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:#e5e7eb;
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h2{
margin-bottom:20px;
}

input,select,button{
padding:10px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
width:100%;
box-sizing:border-box;
}

button{
background:#2563eb;
cursor:pointer;
}

.filtros{
display:grid;
grid-template-columns:200px 1fr 1fr 1fr 1fr 120px;
gap:10px;
margin-bottom:20px;
align-items:center;
}

 .btn-limpar{
background:#2563eb;
height:42px;
} 

  

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #1e293b;
}


/* CARDS MOBILE */

.cards{
display:none;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:15px;
margin-bottom:12px;
}

.card b{
display:block;
margin-bottom:6px;
}

.card button{
margin-top:10px;
}




.acoes{
display:flex;
gap:8px;
align-items:center;
}

.btn-whats{
background:#16a34a;
padding:6px 10px;
border-radius:6px;
text-decoration:none;
}

.btn-tel{
background:#e11d48;
padding:6px 10px;
border-radius:6px;
text-decoration:none;
}

.btn-editar{
background:#eab308;
color:black;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-whats:hover{
background:#15803d;
}

.btn-tel:hover{
background:#be123c;
}

.btn-editar:hover{
background:#ca8a04;
}



  

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
padding:15px;
}

.modal-box{
background:#020617;
padding:20px;
border-radius:10px;
width:100%;
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
max-height:90vh;
overflow:auto;
}

.actions{
display:flex;
gap:10px;
}

/* LOGIN */

.login{
max-width:400px;
margin:auto;
margin-top:100px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MOBILE */

@media(max-width:700px){

.filtros{
grid-template-columns:1fr;
}

table{
display:none;
}

.cards{
display:block;
}

}
</style>

</head>
<body>

<script src="/js/igc-config.js"></script>

<!-- LOGIN -->

<div id="loginBox" class="login">

<h2>Acesso Restrito</h2>

<input type="password" id="senhaLogin" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="loginErro"></p>

</div>

<!-- APP -->

<div id="appBox" class="container" style="display:none">

<h2>Gestor de Pré-Inscritos</h2>

<div class="filtros">


<select id="fOrdem" onchange="ordenarLista()">
<option value="novo">Mais novos primeiro</option>
<option value="antigo">Mais antigos primeiro</option>
</select>  

<input id="fCpf" placeholder="CPF" oninput="buscarAuto()">
<input id="fNome" placeholder="Nome" oninput="buscarAuto()">
<input id="fEmail" placeholder="Email" oninput="buscarAuto()">
<input id="fTurma" placeholder="Turma" oninput="buscarAuto()">

</div>

<button class="btn-limpar" onclick="carregar()">Limpar</button>

<br><br>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Curso</th>
<th>Turma</th>
<th>Pagamento</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div id="cards" class="cards"></div>

  
<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Editar inscrição</h3>

<input id="eCpf">
<input id="eNome">
<input id="eEmail">
<input id="eTelefone">

<input id="eCurso">
<input id="eCidade">
<input id="eEstado">
<input id="eTurma">

<input id="eCarga">
<input id="eLocal">
<input id="eData">

<select id="ePagamento">
<option value="">---</option>
<option>SIM</option>
<option>NÃO</option>
<option>PROCESSADO</option>
</select>

<div class="actions">

<button onclick="salvar()">Salvar</button>
<button onclick="fechar()">Cancelar</button>

</div>

</div>

</div>

<script>

const API = window.IGC_CONFIG.APPS_SCRIPT_BASE;

let dados=[];
let linhaAtual=null;
let senha="";

/* LOGIN */

async function login(){

const senhaDigitada = document.getElementById("senhaLogin").value;

const res = await fetch(API,{
method:"POST",
body:JSON.stringify({
acao:"loginCursos",
senha:senhaDigitada
})
});

const r = await res.json();

if(!r.ok){
document.getElementById("loginErro").innerText="Senha inválida";
return;
}

senha = senhaDigitada;

/* ESCONDE LOGIN */
document.getElementById("loginBox").style.display="none";

/* MOSTRA APP */
document.getElementById("appBox").style.display="block";

carregar();

}



  
/* LISTAR */

async function carregar(){

/* LIMPA FILTROS */
document.getElementById("fCpf").value="";
document.getElementById("fNome").value="";
document.getElementById("fEmail").value="";
document.getElementById("fTurma").value="";

const res = await fetch(API+"?acao=listarPreInscritos");

dados = await res.json();

render(dados);

}






/* ORDENAR LISTAR */

function ordenarLista(){

const ordem=document.getElementById("fOrdem").value;

if(ordem==="antigo"){

dados.sort((a,b)=>a.linha-b.linha);

}else{

dados.sort((a,b)=>b.linha-a.linha);

}

render(dados);

}


  




  
/* RENDER */

function render(lista){

const tbody=document.getElementById("lista");
const cards=document.getElementById("cards");

tbody.innerHTML="";
cards.innerHTML="";

lista.forEach(i=>{

/* TABELA DESKTOP */

tbody.innerHTML+=`
<tr>

<td>${i.nome}</td>
<td>${i.curso}</td>
<td>${i.turma}</td>
<td>${i.pagamento || ""}</td>

<td class="acoes">

<a class="btn-whats" href="https://wa.me/55${i.telefone}" target="_blank">
📲
</a>

<a class="btn-tel" href="tel:${i.telefone}">
📞
</a>

<button class="btn-editar" onclick="editar(${i.linha})">
Editar
</button>

</td>

</tr>
`;

/* CARD MOBILE */

cards.innerHTML+=`
<div class="card">

<b>${i.nome}</b>

Curso: ${i.curso}<br>
Turma: ${i.turma}<br>
Pagamento: ${i.pagamento || ""}

<div style="margin-top:10px">

<a href="https://wa.me/55${i.telefone}" target="_blank">📲 Whats</a>
<br>
<a href="tel:${i.telefone}">📞 Ligar</a>

</div>

<button class="btn-editar" onclick="editar(${i.linha})">
Editar
</button>

</div>
`;

});

}



  

/* BUSCAR */

async function buscar(){

const cpf=fCpf.value;
const nome=fNome.value;
const email=fEmail.value;
const turma=fTurma.value;

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"buscarPreInscritos",

filtro:{
cpf,
nome,
email,
turma
}

})
});

const r=await res.json();

dados=r;

render(dados);

}

/* EDITAR */

function editar(linha){

linhaAtual=linha;

const r=dados.find(x=>x.linha===linha);

eCpf.value=r.cpf;
eNome.value=r.nome;
eEmail.value=r.email;
eTelefone.value=r.telefone;

eCurso.value=r.curso;
eCidade.value=r.cidade;
eEstado.value=r.estado;
eTurma.value=r.turma;

eCarga.value=r.carga;
eLocal.value=r.local;
eData.value=r.data;

ePagamento.value=r.pagamento;

modal.style.display="flex";

}


  

/* FECHAR MODAL */

function fechar(){

modal.style.display="none";

}





async function buscarAuto(){

const cpf=fCpf.value;
const nome=fNome.value;
const email=fEmail.value;
const turma=fTurma.value;

if(!cpf && !nome && !email && !turma){
carregar();
return;
}

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"buscarPreInscritos",

filtro:{
cpf,
nome,
email,
turma
}

})
});

const r=await res.json();

dados=r;

render(dados);

}
  








  
/* SALVAR */

async function salvar(){

await fetch(API,{
method:"POST",
body:JSON.stringify({

acao:"editarPreInscrito",
senha:senha,

linha:linhaAtual,

cpf:eCpf.value,
nome:eNome.value,
email:eEmail.value,
telefone:eTelefone.value,

curso:eCurso.value,
cidade:eCidade.value,
estado:eEstado.value,
turma:eTurma.value,

carga:eCarga.value,
local:eLocal.value,
data:eData.value,

pagamento:ePagamento.value

})
});

fechar();
carregar();

}

</script>

</body>
</html>
